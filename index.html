<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>,STAR SCRIPT| BEST KEYLESS HUB FOR GAG2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0a;
            --card-bg: rgba(18, 18, 18, 0.8);
            --accent-red: #ff3e3e;
            --accent-glow: rgba(255, 62, 62, 0.3);
            --text-main: #e0e0e0;
            --text-dim: #888;
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Mesh */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(40, 0, 0, 0.15) 0%, transparent 80%);
            z-index: -1;
        }

        /* Main Container */
        .container {
            width: 90%;
            max-width: 500px;
            padding: 40px 20px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header h1 {
            font-weight: 800;
            font-size: 2.2rem;
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        header p {
            color: var(--accent-red);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        /* Code Area */
        .script-box {
            position: relative;
            background: #000;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            padding: 15px;
            margin-bottom: 25px;
            transition: border 0.3s ease;
        }

        .script-box:hover {
            border-color: rgba(255, 62, 62, 0.4);
        }

        pre {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #d1d1d1;
            overflow-x: auto;
            text-align: left;
            white-space: pre-wrap;
            word-break: break-all;
            height: 120px;
            scrollbar-width: thin;
            scrollbar-color: #333 transparent;
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 12px;
            flex-direction: column;
        }

        .btn {
            cursor: pointer;
            border: none;
            border-radius: 10px;
            padding: 14px 24px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: #fff;
            color: #000;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.2);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-main);
        }

        .btn-outline:hover {
            border-color: var(--accent-red);
            color: var(--accent-red);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* Footer */
        footer {
            margin-top: 30px;
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 0.5px;
        }

        /* Toast Notification */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent-red);
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Star Scripts</h1>
            <p>Powerful Script Loader</p>
        </header>

        <div class="script-box">
            <pre id="luaScript">getgenv().SCRIPT_KEY = "KEYLESS"
loadstring(game:HttpGet("https://api.jnkie.com/api/v1/luascripts/public/d1e6efba4fe58b19e5362abff74727721f3f771eb2a97b9831694dff2722ce24/download"))()</pre>
        </div>

        <div class="button-group">
            <button class="btn btn-primary" onclick="copyScript()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                Copy Script
            </button>
            <button class="btn btn-outline">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                Get Script
            </button>
        </div>

        <footer>
            Made by <strong>XZN</strong> &bull; 2026
        </footer>
    </div>

    <div id="toast">Copied to clipboard!</div>

    <script>
        function copyScript() {
            const scriptText = document.getElementById('luaScript').innerText;
            
            navigator.clipboard.writeText(scriptText).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                
                // Haptic feedback feel for the button
                const btn = event.currentTarget;
                btn.style.transform = "scale(0.95)";
                
                setTimeout(() => {
                    toast.classList.remove('show');
                    btn.style.transform = "";
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy: ', err);
            });
        }
    </script>
</body>
</html>
